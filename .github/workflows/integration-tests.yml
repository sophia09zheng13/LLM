name: integration-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq python-dotenv

      - name: Run Chat class doctests (live API)
        run: |
          python -c "
          import chat, doctest
          results = doctest.testmod(chat, verbose=True)
          assert results.failed == 0, f'{results.failed} doctest(s) failed'
          "

      - name: Integration test — single message CLI argument
        run: |
          python -c "
          import sys, io, chat
          from contextlib import redirect_stdout
          sys.argv = ['chat', 'what is 2 + 2?']
          f = io.StringIO()
          with redirect_stdout(f):
              chat.main()
          output = f.getvalue()
          assert '4' in output, f'Expected 4 in output, got: {output}'
          print('single-message test passed:', output.strip())
          "

      - name: Integration test — --debug flag prints tool calls
        run: |
          # these are not good tests;
          # again: if your tests are more complicated than your code, something is going wrong
          # my code below runs the same code as your (minus assert) and is actually how we would expect someone to use the code
          chat --debug 'what is 2 + 2'
