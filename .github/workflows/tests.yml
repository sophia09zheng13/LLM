name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq python-dotenv flake8

      - name: Lint with flake8
        run: |
          flake8 chat.py tools/ --max-line-length=100 --extend-ignore=E501

      - name: Run unit doctests (no API key required)
        run: |
          python -m doctest chat.py -v
          python -m doctest tools/utils.py -v
          python -m doctest tools/calculate.py -v
          python -m doctest tools/cat.py -v
          python -m doctest tools/compact.py -v
          python -m doctest tools/grep.py -v
          python -m doctest tools/ls.py -v
