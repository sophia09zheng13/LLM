name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq python-dotenv flake8

      # you shouldn't flake8 in both spots;
      # the reason to have a separate flake8 action
      # is so that the doctests can still run
      # even if flake8 fails
      - name: Run unit doctests (no API key required)
        run: |
          python -m doctest chat.py -v
          python -m doctest tools/*.py -v
